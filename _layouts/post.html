---
layout: default
---
<article class="container post">
    <a class="back-link" href="/blog/"><i class="fa-solid fa-arrow-left"></i> All posts</a>
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
        <i class="fa-regular fa-calendar"></i> {{ page.date | date: "%B %-d, %Y" }}
        {% if page.tags %} &middot; {% for t in page.tags %}<span class="post-tag">#{{ t }}</span> {% endfor %}{% endif %}
    </p>
    <div class="post-content">
        {{ content }}
    </div>
</article>

{% include cta.html %}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "author": { "@type": "Person", "name": "Hemant Patkar", "url": "{{ site.url }}" },
  "mainEntityOfPage": "{{ page.url | prepend: site.url }}"
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ site.url }}/" },
    { "@type": "ListItem", "position": 2, "name": "Blog", "item": "{{ site.url }}/blog/" },
    { "@type": "ListItem", "position": 3, "name": {{ page.title | jsonify }} }
  ]
}
</script>
