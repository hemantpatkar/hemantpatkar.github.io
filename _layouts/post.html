---
layout: default
---
<article class="container post">
    <a class="back-link" href="/blog/"><i class="fa-solid fa-arrow-left"></i> All posts</a>
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
        <i class="fa-regular fa-calendar"></i> {{ page.date | date: "%B %-d, %Y" }}
        {% if page.tags %} &middot; {% for t in page.tags %}<span class="post-tag">#{{ t }}</span> {% endfor %}{% endif %}
    </p>
    <div class="post-content">
        {{ content }}
    </div>
</article>

{% include cta.html %}
